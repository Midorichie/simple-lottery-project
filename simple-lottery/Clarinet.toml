[project]
name = "simple-lottery"
description = "A secure, configurable lottery system using SIP-010 fungible tokens with enhanced features"
authors = ["midorichie"]
telemetry = false
require-stacks-blockchain = ">=2.05.0"

[contracts.lottery]
path = "contracts/lottery.clar"
depends_on = ["sip-010-trait"]

[contracts.token]
path = "contracts/token.clar"
depends_on = ["sip-010-trait"]

[contracts.sip-010-trait]
path = "contracts/sip-010-trait.clar"

# Development settings
[repl]
costs = false
disk_costs_per_byte = 170

# Network configurations
[repl.analysis]
passes = ["check_checker"]

# Testing configuration
[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = true
